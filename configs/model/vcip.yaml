# @package _global_
model:
  _target_: src.models.vae_model.VAEModel
  name: VCIP
  z_dim: 16
  auxiliary:
    _target_: src.models.auxiliary_model.AuxiliaryModel
    hidden_dim: 16
    num_layers: 2
    hiddens_G_y:
    - 16
    - 16
    hiddens_G_x:
    - 16
    - 16
    lr: 0.001
  inference:
    _target_: src.models.inference_model.InferenceModel
    hidden_dim: 16
    num_layers: 2
    hiddens_F_mu:
    - 16
    # - 16
    hiddens_F_logvar:
    - 16
    # - 16
    predict_y_history:
    - 16
    # - 16
    do: True
  generative:
    _target_: src.models.generative_model.GenerativeModel
    entropy_lambda: 1
    hidden_dim: 16
    treatment_hidden_dim: 16
    num_layers: 2
    hiddens_F_mu:
    - 16
    # - 16
    hiddens_F_logvar:
    - 16
    # - 16
    hiddens_decoder:
    - 16
    # - 16
    hidden_action_decoder:
    - 16
    # - 16
    hidden_action_decoder_step:
    - 16
    # - 16
  lr: 0.001
exp:
  seed: 10
  batch_size: 512
  batch_size_val: 128
  num_samples: 10
  dropout: 0.2
  epochs: 100
  patience: 20
  lr: 0.01
  weight_decay: 1.0e-05
  lambda_X: 0.1
  lambda_Y: 1
  load_best: true
  val: true
  weights_ema: true
  tau: 6
  repeats: 5
  lambda_step: 0.1
  lambda_kl: 1
  lambda_reg: 1
  lambda_action: 1
  lambda_hy: 1
  beta_bound: -10
  # IQL planner (train_iql_planner.py) — declared so Hydra struct mode allows overrides without +exp.*
  iql_updates: 5000
  iql_batch_size: 256
  iql_max_patients: null
  # Path to train_ct ``ct_best_encoder.pt``, VAE ``model.ckpt`` (inference_model.*), or flat InferenceModel weights
  iql_inference_ckpt: ""
  iql_reward_type: negative_outcome_mse
  iql_max_action: 1.0
  iql_hidden_dim: 256
  iql_n_hidden: 2
  iql_tau: 0.7
  iql_beta: 3.0
  iql_discount: 0.99
  iql_target_tau: 0.005
  iql_actor_lr: 3.0e-4
  iql_qf_lr: 3.0e-4
  iql_vf_lr: 3.0e-4
  iql_deterministic: false
  iql_actor_dropout: null
  # eval_iql_planner.py: empty -> iql_models/seed_{seed}/gamma_{coeff}/iql_planner.pt
  iql_eval_ckpt: ""
  # train_ct.py — standalone CT + WeightNet + Predictor (ctd.md)
  ct_align_loss: sinkhorn
  ct_alpha: 0.1
  ct_lr: 0.001
  ct_epochs: 200
  ct_patience: 20
  ct_weight_decay: 1.0e-05
  ct_sinkhorn_blur: 0.01
  ct_batch_size: 256
  ct_batch_size_val: 128
  ct_num_workers: 0
  ct_weight_hidden: 64
  ct_predictor_hidden: 64
