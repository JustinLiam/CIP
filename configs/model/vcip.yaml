# @package _global_
model:
  _target_: src.models.vae_model.VAEModel
  name: VCIP
  z_dim: 16
  auxiliary:
    _target_: src.models.auxiliary_model.AuxiliaryModel
    hidden_dim: 16
    num_layers: 2
    hiddens_G_y:
    - 16
    - 16
    hiddens_G_x:
    - 16
    - 16
    lr: 0.001
  inference:
    _target_: src.models.inference_model.InferenceModel
    hidden_dim: 16
    num_layers: 2
    hiddens_F_mu:
    - 16
    # - 16
    hiddens_F_logvar:
    - 16
    # - 16
    predict_y_history:
    - 16
    # - 16
    do: True
  generative:
    _target_: src.models.generative_model.GenerativeModel
    entropy_lambda: 1
    hidden_dim: 16
    treatment_hidden_dim: 16
    num_layers: 2
    hiddens_F_mu:
    - 16
    # - 16
    hiddens_F_logvar:
    - 16
    # - 16
    hiddens_decoder:
    - 16
    # - 16
    hidden_action_decoder:
    - 16
    # - 16
    hidden_action_decoder_step:
    - 16
    # - 16
  lr: 0.001
exp:
  seed: 10
  batch_size: 512
  batch_size_val: 128
  num_samples: 10
  dropout: 0.2
  epochs: 100
  patience: 20
  lr: 0.01
  weight_decay: 1.0e-05
  lambda_X: 0.1
  lambda_Y: 1
  load_best: true
  val: true
  weights_ema: true
  tau: 12
  repeats: 10
  lambda_step: 0.1
  lambda_kl: 1
  lambda_reg: 1
  lambda_action: 1
  lambda_hy: 1
  beta_bound: -10
  # IQL planner (train_iql_planner.py) — declared so Hydra struct mode allows overrides without +exp.*
  iql_updates: 5000
  iql_batch_size: 256
  iql_max_patients: null
  # Path to train_ct ``ct_best_encoder.pt``, VAE ``model.ckpt`` (inference_model.*), or flat InferenceModel weights
  iql_inference_ckpt: ""
  # Reward design for offline RL transitions (see iql_dataset_builder.py docstring).
  #   negative_outcome      : r = -|y_{t+1} - y_target|                (L1, RECOMMENDED)
  #   negative_outcome_mse  : r = -(y_{t+1} - y_target)^2              (L2, heavy-tailed!)
  #   progress              : r = |y_t - y_target| - |y_{t+1} - y_target|
  #     NOTE: "progress" was tried as a long-horizon signal but empirically
  #     collapses V/Q to ≈0 under HER-sampled y_target — mean(r)≈0 and
  #     |r|~0.01 for slow-changing tumor data, so the AWR advantage vanishes
  #     and the IQL policy degenerates to pure behavior cloning (actor_loss
  #     plateaus at the BC baseline, mae_uns stuck at the factual baseline).
  #     Also has a sign conflict: treatment that shrinks tumor pushes y_next
  #     away from the factual-future y_target → good actions get negative
  #     reward. L1 below does not have this issue.
  iql_reward_type: negative_outcome
  # Hard-clip |r| to suppress simulator-overflow outliers (raw MSE on cancer_sim
  # γ=4 has min≈-117 even though q99=0). With L1 reward the typical |r| ~ 0.3,
  # outliers |r| ~ 10; clip=3.0 kills the worst 1% without distorting 99% of the
  # learning signal. Directly eliminates the Twin-Q spike pattern (r in batch
  # → TD target jumps → q_loss ~ 0.5·r²). 0 disables.
  iql_reward_clip: 3.0
  # none | auto. "auto" divides the whole reward buffer by its empirical std
  # so TD targets stay O(1) regardless of outcome scale (standard IQL trick).
  # Recommended together with reward_clip: after clipping we re-normalize so
  # V fixed point ≈ E[r]/(1-γ) is O(10) rather than O(100).
  iql_reward_scale: auto
  iql_max_action: 1.0
  # Map dataset treatments in [0, iql_max_action] to [-iql_max_action, iql_max_action] for Tanh IQL actor
  iql_dataset_actions_unit_interval: true
  iql_hidden_dim: 256
  iql_n_hidden: 2
  # iql_tau: 策略价值函数加权的 expectile 参数，控制“policy value”与“critic value”之间的偏置。具体地，TD3+BC 和 IQL 论文中用于 expectile regression，建议在 0.5~0.9 之间，越大代表更乐观估计。
  iql_tau: 0.7
  iql_beta: 1.0
  iql_discount: 0.99
  # iql_target_tau: 目标网络软更新的参数，每次更新时新参数 = target_tau * 当前参数 + (1 - target_tau) * 旧目标参数。控制 Q/V/Actor 目标网络更新速度，建议 0.001 ~ 0.01 小数。
  iql_target_tau: 0.005
  iql_actor_lr: 3.0e-4
  iql_qf_lr: 3.0e-4
  iql_vf_lr: 3.0e-4
  # Periodic val MAE on train_f-side val_f during IQL training; 0 disables (last-step ckpt only).
  # Selection metric is computed on val_f only (no test_f exposure), with a fixed RNG snapshot
  # so successive checkpoints share the same eval protocol.
  iql_val_every: 200
  iql_val_batch_size: null
  # Metric to minimize for best checkpoint: mae_uns | mae_norm
  iql_val_metric: mae_uns
  # Also save final-step weights to iql_planner_last.pt when val is enabled
  iql_val_save_last: true
  # Smoothed metrics in train_iql logs: trailing mean over this many steps (default 200)
  iql_log_window: 200
  # Optional L2 grad clip per network (V, Q twin, actor); null = disabled
  iql_max_grad_norm: 5.0
  iql_deterministic: false
  iql_actor_dropout: null
  # eval_iql_planner.py: empty -> iql_models/seed_{seed}/gamma_{coeff}/iql_planner.pt
  iql_eval_ckpt: ""
  # Roll out τ steps: each step replans from CT state after appending (a_t, y_{t+1}); false = repeat first action (legacy)
  iql_eval_autoregressive: true
  # Model-based OPE A/B during IQL val:
  #   - sim:       ground-truth cancer simulator oracle (synthetic benchmark only).
  #   - predictor: learned OutcomePredictor from ct_best_encoder.pt (works on real data).
  # When >=2 worlds are listed, train_iql_planner.py tracks a separate best checkpoint
  # per world and logs Spearman rank correlation / top-K overlap / regret across worlds.
  iql_val_worlds: [sim, predictor]
  # Which world's best checkpoint becomes the primary iql_planner.pt consumed by eval_iql_planner.
  # Must appear in iql_val_worlds.
  iql_val_selection_world: sim
  # Horizon-aware IQL: normalize time-to-go; must match iql_dataset_builder / eval_iql_planner
  max_tau: 12.0
  # train_ct.py — standalone CT + WeightNet + Predictor (ctd.md)
  ct_align_loss: sinkhorn
  # ct_alpha: 0.1 使用EM方法后， 该参数不生效
  ct_lr: 1e-4
  ct_epochs: 200
  ct_patience: 20
  ct_weight_decay: 1.0e-05
  ct_sinkhorn_blur: 0.01
  ct_batch_size: 512
  ct_batch_size_val: 256
  ct_num_workers: 0
  ct_weight_hidden: 64
  ct_predictor_hidden: 64
  # Multi-horizon teacher losses (k=1..K) + optional scheduled sampling on prev_outputs for k>=2; alignment stays k=1 only.
  ct_multi_k_max: 3
  ct_multi_eta: 0.5
  ct_sched_p_start: 0.3
  ct_sched_p_end: 0.8
  ct_sched_ramp_epochs: 100
  # train_ct early stopping + best ckpt. Options:
  #   weighted : multi-horizon WeightNet-reweighted val MSE (legacy).
  #   l1       : k=1 WeightNet-reweighted val MSE. BIASED when WeightNet concentrates
  #              mass onto easy samples — gives rosy numbers that mask the true
  #              population-level predictor error (see ct_anchor_weight docs).
  #   mae_uw   : k=1 UN-weighted val MAE on normalized y. This is the factual
  #              prediction accuracy the downstream IQL outcome_predictor actually
  #              uses during rollouts, and matches CFRNet / Causal Transformer /
  #              CTD-NKO paper conventions. Recommended when ct_anchor_weight > 0.
  ct_es_metric: mae_uw
  # Log the full percentile distribution of WeightNet outputs every N epochs
  # (the compact ESS/std/min/max line is logged every epoch regardless).
  ct_weight_log_every: 5
  # E-step inner loop: number of WeightNet updates per batch before the M-step.
  # k_inner=1 preserves the legacy 1:1 E/M interleaving (identical behaviour to before).
  # k_inner>1 gives the E-step more iterations per batch to converge against the frozen
  # encoder output Z_t.detach(), analogous to CTD-NKO's per-epoch full refit but at the
  # batch level. Typical values to try: 3, 5, 10. Higher = stronger deconfounding
  # pressure but ~linearly more Sinkhorn evaluations per batch.
  ct_k_inner: 5
  # WeightNet learning rate (separate from encoder+predictor LR, which is hard-coded
  # to 1e-4 inside train_ct.py). Set to null => fall back to ct_lr for backward compat.
  # When raising ct_k_inner>1, the [E-inner] drop often comes back too small (<5%)
  # because Sinkhorn gradients are tiny; try ct_w_lr in [5e-3, 1e-2] to make each
  # inner update actually move the parameters. Reference CTD-NKO uses lr=0.1 for a
  # similar WeightNet (extreme, only because they refit from scratch every update).
  ct_w_lr: 5e-3
  # Gradient-clip max_norm applied to WeightNet params after each inner-loop backward.
  # Raise together with ct_w_lr (e.g. 5.0 for w_lr=1e-2); set to null to disable clip.
  ct_w_clip: 5.0
  # Anchor-loss blend for the M-step (Plan A for predictor-bias fix).
  # Total M-step loss = (1 - ct_anchor_weight) * weighted_MSE + ct_anchor_weight * uniform_MSE.
  # Motivation: WeightNet's softmax-renormalisation (w=softmax*B) concentrates mass on
  # a sub-population whose y-mean typically differs from the full-population y-mean;
  # the predictor then inherits this offset bias (~+0.03 normalized on cancer_sim γ=4,
  # see debug_predictor_sensitivity.py). Mixing a small un-weighted anchor loss gives
  # the predictor an un-biased calibration signal without killing the deconfounding
  # gradient on the encoder. 0.0 = legacy behaviour; 0.5 = equal blend; 1.0 = no
  # reweighting (WeightNet only pushes encoder via loss_align).
  ct_anchor_weight: 0.5
  # CTD-NKO-inspired latent dynamics consistency:
  #   z_next_pred = g(z_t, a_t), with target z_{t+1} = encoder(H_{t+1}) treated as a
  #   stop-gradient teacher signal. This regularizes rollout dynamics in latent space
  #   without changing the downstream IQL interface (which still uses outcome_predictor).
  # Set to 0.0 to disable. A good first sweep is {1e-2, 5e-2, 1e-1}.
  ct_dyn_consistency_weight: 0.1
  # Hidden width of g(z_t, a_t) -> z_{t+1}; defaults to ct_predictor_hidden when unset.
  ct_dyn_hidden: 128
  # Residual latent transition: z_next_pred = z_t + delta(z_t, a_t). Usually stabilizes
  # one-step latent prediction and reduces rollout drift.
  ct_dyn_residual: true
